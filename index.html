<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Extend</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    

    background:#0f1115;
    color:#e0e0e0;

    font-family:Arial, sans-serif;

    /* Image de fond plus tard */
    /*
    background-image:url("images/background.webp");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    */
    margin:0;
    padding:0;
    overflow:hidden;
    height:100%;
}

header{
    margin:0;
    padding:0;
    line-height:0;
}
#header-image{
    width:100%;
    display:block;
 max-height:200px;
}

#app{
    display:flex;
    gap:20px;

    padding:10px 20px 20px 20px;

    height:calc(100vh - 200px);
}

/* ----------------------------- */
/* CALENDRIER */
/* ----------------------------- */

#calendar-panel{
     width:420px;
    flex-shrink:0;

    padding:20px;

    background:rgba(8,12,25,0.85);

    border:1px solid #8f3dff;

    box-shadow:
        0 0 10px rgba(143,61,255,0.4),
        0 0 25px rgba(0,255,255,0.15);

    border-radius:12px;
    animation: borderPulse 6s ease-in-out infinite;
  height:100%;
}

#logo{
    margin-bottom:25px;
}

#logo h1{
    font-size:2rem;
    margin-bottom:5px;
}

#logo p{
    color:#8aa0c5;
    font-size:0.9rem;
}

#controls{
    display:flex;
    gap:10px;

    margin-bottom:20px;
}

#controls select{

    background:#121a2b;

    color:#36d8ff;

    border:1px solid rgba(143,61,255,0.4);

    border-radius:6px;
}

#calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;

    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;
}
.day-header{

    background:#0f1524;

    color:#8fdfff;

    text-transform:uppercase;

    letter-spacing:1px;
   font-weight:bold;

    border-radius:4px;
}

.day{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:40px;
    cursor:pointer;
    transition:0.15s ease;
   background:rgba(70,20,90,0.25);

    color:#f0c8ff;
    border:1px solid rgba(100,180,255,0.35);

    border-radius:8px;

    box-shadow:
        0 0 4px rgba(100,180,255,0.15);

    transition:all 0.15s ease;
}


.day:hover{
   
   background:rgba(180,70,255,0.25);

    border-color:#ff66ff;

    color:white;

    box-shadow:
        0 0 8px rgba(125,211,255,0.6),
        0 0 18px rgba(125,211,255,0.3);

    transform:translateY(-2px);
}

.day:active{
    transform:scale(0.95);
}

.day.selected{

    background:rgba(120,80,255,0.25);

    border:1px solid #c79fff;

    color:white;

    box-shadow:
        0 0 8px #c79fff,
        0 0 20px rgba(199,159,255,0.7);
}

.empty{
    background:transparent;
}

/* ----------------------------- */
/* BILAN */
/* ----------------------------- */

#viewer-panel{

    
    flex:1;

    display:flex;
    flex-direction:column;

    min-height:0;

    background:rgba(8,12,25,0.85);

    border:1px solid #8f3dff;

    border-radius:12px;

    box-shadow:
        0 0 10px rgba(143,61,255,0.4),
        0 0 25px rgba(0,255,255,0.15);

    overflow:hidden;


    flex-direction:column;
    animation: borderPulse 6s ease-in-out infinite;

}

#viewer-header{

    padding:15px 20px;

    background:rgba(80,50,120,0.25);

    border-bottom:1px solid rgba(180,120,255,0.35);

    box-shadow:
        inset 0 -1px 0 rgba(255,255,255,0.05);
}

#viewer-header h2{
    font-size:1.1rem;
}

#bilanFrame{

  flex:1;

    width:100%;

    border:none;

    background:white;

    min-height:0;

    display:block;
}

@keyframes borderPulse {

    0%{
        border-color: rgba(143,61,255,0.45);

        box-shadow:
            0 0 6px rgba(143,61,255,0.20);
    }

    50%{
        border-color: rgba(190,120,255,0.80);

        box-shadow:
            0 0 12px rgba(143,61,255,0.40);
    }

    100%{
        border-color: rgba(143,61,255,0.45);

        box-shadow:
            0 0 6px rgba(143,61,255,0.20);
    }
}
/* ----------------------------- */
/* MOBILE */
/* ----------------------------- */

@media(max-width:900px){

    #calendar-panel{

        height:auto;

        min-height:auto;

        padding:15px;
    }

}

    #app{

        flex-direction:column;

        height:auto;

        padding:10px;

        gap:15px;
    }

    #calendar-panel{

        width:100%;

        height:auto;

        min-height:auto;
    }

    #viewer-panel{

        width:100%;

        height:auto;

           min-height:700px;
    }

    #bilanFrame{

        height:70vh;

        min-height:500px;
    }

    #header-image{

        max-height:100px;
    }

}

</style>
</head>

<body>
<header>
    <img
        src="images/header.png"
        id="header-image"
        alt="Memory Extend">
</header>
<div id="app">

    <aside id="calendar-panel">

    

        <div id="controls">

            <select id="yearSelect"></select>

            <select id="monthSelect">
                <option value="0">Janvier</option>
                <option value="1">Février</option>
                <option value="2">Mars</option>
                <option value="3">Avril</option>
                <option value="4">Mai</option>
                <option value="5">Juin</option>
                <option value="6">Juillet</option>
                <option value="7">Août</option>
                <option value="8">Septembre</option>
                <option value="9">Octobre</option>
                <option value="10">Novembre</option>
                <option value="11">Décembre</option>
            </select>

        </div>

        <div id="calendar"></div>

    </aside>

    <main id="viewer-panel">

        <div id="viewer-header">
            <h2>Bilan sélectionné</h2>
        </div>
<iframe
    id="bilanFrame"
    src="welcome.html">
</iframe>

    </main>

</div>

<script>

const calendar = document.getElementById("calendar");
const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");
const iframe = document.getElementById("bilanFrame");

for(let y = 2025; y <= 2035; y++){

    const option = document.createElement("option");

    option.value = y;
    option.textContent = y;

    yearSelect.appendChild(option);
}

yearSelect.value = new Date().getFullYear();
monthSelect.value = new Date().getMonth();

function generateCalendar(month, year){

    calendar.innerHTML = "";

    const headers = ["Lu","Ma","Me","Je","Ve","Sa","Di"];

    headers.forEach(day=>{

        const cell = document.createElement("div");

        cell.className = "day-header";
        cell.textContent = day;

        calendar.appendChild(cell);

    });

    const firstDay = new Date(year, month, 1);

    let startDay = firstDay.getDay();
    startDay = startDay === 0 ? 6 : startDay - 1;

    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i = 0; i < startDay; i++){

        const empty = document.createElement("div");

        empty.className = "empty";

        calendar.appendChild(empty);
    }

    for(let day = 1; day <= daysInMonth; day++){

        const cell = document.createElement("div");

        cell.className = "day";
        cell.textContent = day;

        cell.addEventListener("click", ()=>{

            // Retire l'ancienne sélection
            document.querySelectorAll(".day").forEach(d=>{
                d.classList.remove("selected");
            });

            // Ajoute la nouvelle sélection
            cell.classList.add("selected");

            const monthStr = String(month + 1).padStart(2,'0');
            const dayStr = String(day).padStart(2,'0');

          const fichier =
`bilans/${year}-${monthStr}-${dayStr}.html`;

fetch(fichier)
.then(response => {

    if(response.ok){

        iframe.src = fichier;

    }else{

        iframe.src = "no-bilan.html";
    }
});
});  
        calendar.appendChild(cell);
    }
}

monthSelect.addEventListener("change", ()=>{
    generateCalendar(
        Number(monthSelect.value),
        Number(yearSelect.value)
    );
});

yearSelect.addEventListener("change", ()=>{
    generateCalendar(
        Number(monthSelect.value),
        Number(yearSelect.value)
    );
});

generateCalendar(
    Number(monthSelect.value),
    Number(yearSelect.value)
);

</script>

</body>
</html>
